spring.application.name=CreditProject

# ========================
# Server
# ========================
server.port=${PORT:8080}

# ========================
# Database
# ========================
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# Flyway
# ========================
spring.flyway.enabled=false

# ========================
# Mono API
# ========================
mono.mashup.url=https://api.withmono.com/v3/lookup/mashup
mono.api.url=https://api.withmono.com/v3/lookup/credit-history/crc
mono.nin.url=https://api.withmono.com/v3/lookup/nin
mono.api.base-url=https://api.withmono.com
mono.api.secret-key=${MONO_SECRET_KEY}
mono.public.key=${MONO_PUBLIC_KEY}
mono.sec.key=${MONO_SECRET_KEY}
mono.api.key=${MONO_SECRET_KEY}

# ========================
# Twilio
# ========================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.verify.sid=${TWILIO_VERIFY_SID}
twilio.from.number=Koolbuy

# ========================
# Email (SMTP)
# ========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=foltim256@gmail.com
spring.mail.password=ngarekvknmnibnpq
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# Notification Emails
# ========================
notification.email.from=foltim256@gmail.com
notification.email.to=mod.timson@iconicuniversity.edu.ng
after.sales.team.email=mod.timson@iconicuniversity.edu.ng
logistics.team.email=mod.timson@iconicuniversity.edu.ng
installation.team.email=mod.timson@iconicuniversity.edu.ng
inventory.team.email=mod.timson@iconicuniversity.edu.ng

# ========================
# Frontend / Payment URLs
# ========================
payment.url=https://koolkredit-bnpl-frontend.vercel.app/pay
frontend.base.url=https://koolkredit-bnpl-frontend.vercel.app
# ========================
# File Upload
# ========================
file.upload.directory=/tmp/uploads/receipts
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# DTI Thresholds
# ========================
dti.threshold.green=40
dti.threshold.amber=60

# ========================
# Swagger / SpringDoc
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ========================
# Jackson
# ========================
spring.jackson.serialization.write-dates-as-timestamps=false













