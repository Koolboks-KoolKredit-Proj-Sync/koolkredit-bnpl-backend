spring.application.name=CreditProject

# Database - will come from environment variables
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Server
server.port=${PORT:5000}

# Flyway
spring.flyway.enabled=false

# Mono API
mono.api.base-url=https://api.withmono.com
mono.api.secret-key=${MONO_SECRET_KEY}
mono.public.key=${MONO_PUBLIC_KEY}

# Twilio
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.verify.sid=${TWILIO_VERIFY_SID}
twilio.from.number=Koolbuy

# Email
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

notification.email.from=${MAIL_USERNAME}
notification.email.to=${NOTIFICATION_EMAIL_TO}
after.sales.team.email=${NOTIFICATION_EMAIL_TO}
logistics.team.email=${NOTIFICATION_EMAIL_TO}
installation.team.email=${NOTIFICATION_EMAIL_TO}
inventory.team.email=${NOTIFICATION_EMAIL_TO}

# File Upload
file.upload.directory=/tmp/uploads/receipts
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Frontend URLs
payment.url=${PAYMENT_URL}
frontend.base.url=${FRONTEND_URL}

# DTI
dti.threshold.green=40
dti.threshold.amber=60

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
