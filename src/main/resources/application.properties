spring.application.name=CreditProject

# ========================
# Server
# ========================
server.port=${PORT:8080}

# ========================
# Database
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / Hibernate
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ========================
# Flyway
# ========================
spring.flyway.enabled=false

# ========================
# Jackson
# ========================
spring.jackson.serialization.write-dates-as-timestamps=false

# ========================
# Swagger / SpringDoc
# ========================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ========================
# File Upload
# ========================
file.upload.directory=/tmp/uploads/receipts
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# DTI Thresholds
# ========================
dti.threshold.green=40
dti.threshold.amber=60

# ========================
# App URLs
# ========================
app.base.url=${APP_BASE_URL}
payment.url=${PAYMENT_URL}
frontend.base.url=${FRONTEND_BASE_URL}

# ========================
# Mono API
# ========================
mono.mashup.url=https://api.withmono.com/v3/lookup/mashup
mono.api.url=https://api.withmono.com/v3/lookup/credit-history/crc
mono.nin.url=https://api.withmono.com/v3/lookup/nin
mono.api.base-url=https://api.withmono.com
mono.api.secret-key=${MONO_SECRET_KEY}
mono.public.key=${MONO_PUBLIC_KEY}
mono.sec.key=${MONO_SECRET_KEY}
mono.api.key=${MONO_SECRET_KEY}

# ========================
# Twilio
# ========================
twilio.account.sid=${TWILIO_ACCOUNT_SID}
twilio.auth.token=${TWILIO_AUTH_TOKEN}
twilio.verify.sid=${TWILIO_VERIFY_SID}
twilio.from.number=Koolbuy

# ========================
# Email (Brevo SMTP)
# ========================
spring.mail.host=smtp-relay.brevo.com
spring.mail.port=465
spring.mail.username=${BREVO_USERNAME}
spring.mail.password=${BREVO_SMTP_KEY}
brevo.api.key=${BREVO_API_KEY}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ========================
# Notification Emails
# ========================
notification.email.from=${NOTIFICATION_EMAIL_FROM}
notification.email.to=${NOTIFICATION_EMAIL_TO}
